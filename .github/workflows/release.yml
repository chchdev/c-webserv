name: Release

on:
  push:
    tags:
      - "v*"
  schedule:
    - cron: "0 0 * * 0" # Runs every Sunday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-binutils
          update: false

      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
        shell: pwsh

      - name: Build installer
        run: ./build/build-installer.ps1 -Compiler gcc -Configuration Release
        shell: pwsh

      - name: Determine release metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
            $name = "c-webserv $tag"
            $prerelease = "false"
          } else {
            $date = (Get-Date -Format "yyyy.MM.dd")
            $tag = "nightly-$date-${{ github.run_number }}"
            $name = "c-webserv nightly $date"
            $prerelease = "true"
          }
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "name=$name" >> $env:GITHUB_OUTPUT
          echo "prerelease=$prerelease" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            bin/installer/c-webserv-setup.exe
